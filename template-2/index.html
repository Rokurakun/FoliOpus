<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title></title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="nav-fixed">
    <nav class="nav-links"></nav>
    <div class="nav-right">
      <a class="btn-buy"></a>
      <a href="#contact" class="btn-talk"></a>
    </div>
  </header>

  <section id="about" class="section section--about">
    <div class="noise-overlay"></div>
    <div class="about-grid">
      <div class="about-tag">
        <span class="tag-line"></span>
        <span class="tag-dot"></span>
        <span class="tag-avail"></span>
      </div>
      <h1 class="about-name">
        <span class="name-line" data-delay="0"></span>
        <span class="name-line name-line--gold" data-delay="120"></span>
      </h1>
      <p class="about-role"></p>
      <div class="about-meta"></div>
      <div class="about-cta-row">
        <a class="cta-primary"></a>
        <a class="cta-secondary"></a>
      </div>
    </div>
    <div class="about-deco">
      <div class="deco-circle"></div>
      <div class="deco-line"></div>
      <div class="deco-grid"></div>
    </div>
    <div class="about-scroll-hint">
      <span>scroll</span>
      <div class="scroll-bar"></div>
    </div>
  </section>

  <section id="logs" class="section section--logs">
    <div class="noise-overlay"></div>
    <div class="section-inner">
      <div class="section-header">
        <span class="section-num"></span>
        <h2 class="section-title"></h2>
        <p class="section-sub"></p>
      </div>
      <div class="logs-timeline"></div>
    </div>
  </section>

  <section id="work" class="section section--work">
    <div class="noise-overlay"></div>
    <div class="section-inner">
      <div class="section-header">
        <span class="section-num"></span>
        <h2 class="section-title"></h2>
        <p class="section-sub"></p>
      </div>
      <div class="work-grid"></div>
    </div>
  </section>

  <section id="stats" class="section section--stats">
    <div class="noise-overlay"></div>
    <div class="section-inner">
      <div class="section-header">
        <span class="section-num"></span>
        <h2 class="section-title"></h2>
        <p class="section-sub"></p>
      </div>
      <div class="stats-grid"></div>
      <div class="stats-brands">
        <span class="brands-label"></span>
        <div class="brands-row"></div>
      </div>
    </div>
  </section>


  <section id="skill" class="section section--skill">
    <div class="noise-overlay"></div>
    <div class="section-inner">
      <div class="section-header">
        <span class="section-num"></span>
        <h2 class="section-title"></h2>
        <p class="section-sub"></p>
      </div>
      <div class="skill-layout"></div>
    </div>
  </section>

  <section id="buy" class="section section--buy">
    <div class="noise-overlay"></div>
    <div class="section-inner">
      <div class="buy-grid">

        <div class="buy-left">
          <span class="buy-num"></span>
          <h2 class="buy-headline"></h2>
          <div class="buy-price-wrap">
            <div class="buy-price-num"></div>
            <div class="buy-price-note"></div>
          </div>
          <button class="btn-buy-cta"></button>
        </div>

        <div class="buy-right">
          <span class="buy-right-label"></span>
          <ul class="buy-features"></ul>
        </div>

      </div>
    </div>
  </section>

  <div class="modal-overlay" id="contact">
    <div class="modal-box">
      <button class="modal-close" id="modalClose">&#x2715;</button>
      <p class="modal-eyebrow"></p>
      <h2 class="modal-title"></h2>
      <p class="modal-sub"></p>
      <div class="modal-contacts"></div>
      <div class="modal-footer"></div>
    </div>
  </div>

  <div class="buy-modal-overlay" id="buyModal">
    <div class="buy-modal-box">
      <button class="modal-close" id="buyModalClose">&#x2715;</button>
      <p class="modal-eyebrow"></p>
      <div class="buy-modal-price-wrap">
        <div class="buy-modal-price"></div>
        <div class="buy-modal-price-note"></div>
      </div>
      <h2 class="modal-title"></h2>
      <ul class="buy-modal-features"></ul>
      <a class="buy-modal-cta"></a>
      <p class="buy-modal-note"></p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
