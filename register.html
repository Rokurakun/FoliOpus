<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoliOpus — Daftar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page register-page">
 
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
 
    <a href="login.html" class="back-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
        Sudah punya akun? Masuk
    </a>
 
    <div class="card register-card">
 
        <div class="logo" style="font-size: 1.9rem;">FoliOpus</div>
        <p class="login-tagline">Platform Portofolio Digital Interaktif</p>
 
        <h1 class="login-title">Buat akun baru</h1>
        <p class="login-subtitle">Gratis</p>
 
        <div class="alert-box" id="alertBox"></div>
 
        <!-- Username -->
        <div class="form-group">
            <label for="username">Username</label>
            <div class="input-wrapper">
                <input type="text" id="username" placeholder="Minimal 3 karakter"
                    autocomplete="username" spellcheck="false" maxlength="30" />
                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
                </svg>
            </div>
            <p class="field-error" id="usernameError"></p>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <div class="input-wrapper">
                <input type="password" id="password" placeholder="Minimal 6 karakter"
                    autocomplete="new-password" />
                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
                <button class="toggle-pw" id="togglePw1" type="button" aria-label="Tampilkan password">
                    <svg id="eye1Show" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                    </svg>
                    <svg id="eye1Hide" style="display:none;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                        <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                        <line x1="1" y1="1" x2="23" y2="23"/>
                    </svg>
                </button>
            </div>
            <div class="strength-bar" id="strengthBar">
                <span></span><span></span><span></span><span></span>
            </div>
            <p class="strength-label" id="strengthLabel"></p>
            <p class="field-error" id="passwordError"></p>
        </div>

        <div class="form-group">
            <label for="confirmPassword">Konfirmasi Password</label>
            <div class="input-wrapper">
                <input type="password" id="confirmPassword" placeholder="Ulangi password kamu"
                    autocomplete="new-password" />
                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M9 12l2 2 4-4"/><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
                <button class="toggle-pw" id="togglePw2" type="button" aria-label="Tampilkan password">
                    <svg id="eye2Show" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                    </svg>
                    <svg id="eye2Hide" style="display:none;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                        <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                        <line x1="1" y1="1" x2="23" y2="23"/>
                    </svg>
                </button>
            </div>
            <p class="field-error" id="confirmError"></p>
        </div>
 
        <button class="btn-primary btn-register" id="btnRegister" type="button">
            <span id="btnText">Buat Akun</span>
            <span class="spinner" id="spinner"></span>
        </button>
 
        <hr class="divider">
        <p class="login-note">Sudah punya akun? <a href="login.html">Masuk sekarang</a></p>
 
    </div>
 
    <script src="script.js"></script>
</body>
</html>
